name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8 mypy

      - name: flake8 (style + errors)
        run: flake8 src/app/ --max-line-length=120 --ignore=E501,W503

      - name: mypy (type checking)
        run: mypy src/app/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.3
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: booking_db
          MYSQL_USER: booking_user
          MYSQL_PASSWORD: booking_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u booking_user -pbooking_password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: .
          FLASK_ENV: testing
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret-key-long-enough
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: booking_user
          MYSQL_PASSWORD: booking_password
          MYSQL_DB: booking_db
          REDIS_URL: redis://localhost:6379/0
